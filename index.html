<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIB Floripa - Sistema de Contagem</title>
    <style>
        :root { --pib-verde: #004d40; --pib-fundo: #f1f8e9; --pib-borda: #a5d6a7; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 15px; font-size: 24px; }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--pib-verde); padding-bottom: 10px; }
        .header h1 { color: var(--pib-verde); font-size: 48px; margin: 0; font-weight: 800; }
        .header p { color: var(--pib-verde); margin: 0; font-size: 24px; }

        .login-container { border: 3px solid var(--pib-verde); padding: 35px 20px; border-radius: 15px; text-align: center; margin-top: 40px; }
        
        .st-expander { border: 2px solid var(--pib-borda); border-radius: 12px; background-color: var(--pib-fundo); margin-bottom: 15px; overflow: hidden; }
        .st-expander-header { 
            background-color: white; color: var(--pib-verde); padding: 22px; 
            cursor: pointer; font-weight: bold; font-size: 28px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .st-expander-header::after { content: '▼'; font-size: 18px; transition: 0.3s; }
        .st-expander.open .st-expander-header::after { content: '▲'; }
        
        .st-expander-content { display: none; padding: 20px; border-top: 1px solid var(--pib-borda); }
        .st-expander.open .st-expander-content { display: block; }

        .faixa { background-color: var(--pib-verde); color: white; padding: 15px; border-radius: 6px; font-size: 22px; margin: 25px 0 12px 0; font-weight: bold; }
        .faixa-centro { text-align: center; }
        .faixa-esquerda { text-align: left; padding-left: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        label { color: var(--pib-verde); font-weight: 800; font-size: 22px; margin-bottom: 10px; display: block; line-height: 1.2; }
        
        input { height: 70px; border: 2px solid #bbb; border-radius: 10px; font-size: 28px; text-align: center; width: 100%; box-sizing: border-box; background-color: white; color: black; margin-bottom: 5px; }
        
        .btn { background-color: var(--pib-verde); color: white; border: none; border-radius: 15px; height: 85px; width: 100%; font-size: 28px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #relatorio-preview { background: #f5f5f5; border: 2px solid #333; padding: 15px; border-radius: 10px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; margin-top: 25px; display: none; font-size: 18px; line-height: 1.4; color: #000; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PIB FLORIPA</h1>
        <p>Sistema de Contagem Oficial</p>
    </div>

    <div id="login-screen" class="login-container">
        <h3 style="color: var(--pib-verde); font-size: 34px;">🔐 Autenticação</h3>
        <input type="password" id="senha" placeholder="Senha..." style="margin-bottom: 25px; width: 90%;">
        <button class="btn" onclick="autenticar()">Entrar</button>
    </div>

    <div id="main-content" class="hidden">
        
        <div class="st-expander" id="exp9">
            <div class="st-expander-header" onclick="toggleExpander('exp9')">🟢 CULTO DAS 09:00h</div>
            <div class="st-expander-content">
                <label>Responsável (9h)</label>
                <input type="text" id="res9" oninput="salvar()" placeholder="Nome...">
                <label style="margin-top:20px;">Data</label>
                <input type="date" id="data_contagem" oninput="salvar()">

                <div class="faixa faixa-centro">Compareceram</div>
                <div class="grid">
                    <div><label>Templo</label><input type="number" id="t9" oninput="salvar()"></div>
                    <div><label>Visitantes</label><input type="number" id="v9" oninput="salvar()"></div>
                    <div><label>6º Andar</label><input type="number" id="s9" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">🛠️ Servindo</div>
                <div class="grid">
                    <div><label>Diaconia</label><input type="number" id="di9" oninput="salvar()"></div>
                    <div><label>Mesa</label><input type="number" id="me9" oninput="salvar()"></div>
                    <div><label>Louvor</label><input type="number" id="lo9" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">🧒 MI (Infantil)</div>
                <div class="grid">
                    <div><label>Crianças</label><input type="number" id="mic9" oninput="salvar()"></div>
                    <div><label>Servos</label><input type="number" id="mis9" oninput="salvar()"></div>
                    <div><label>Pai/Mãe</label><input type="number" id="mip9" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">🧑‍🦱 MPA (Adolescentes)</div>
                <div class="grid">
                    <div><label>Crianças</label><input type="number" id="mpac9" oninput="salvar()"></div>
                    <div><label>Servos</label><input type="number" id="mpas9" oninput="salvar()"></div>
                    <div><label>Pai/Mãe</label><input type="number" id="mpap9" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">📚 Ebed</div>
                <label>Total Ebed</label>
                <input type="number" id="eb9" oninput="salvar()">
            </div>
        </div>

        <div class="st-expander" id="exp11">
            <div class="st-expander-header" onclick="toggleExpander('exp11')">🟢 CULTO DAS 11:00h</div>
            <div class="st-expander-content">
                <label>Responsável (11h)</label>
                <input type="text" id="res11" oninput="salvar()" placeholder="Nome...">

                <div class="faixa faixa-centro">Compareceram</div>
                <div class="grid">
                    <div><label>Templo</label><input type="number" id="t11" oninput="salvar()"></div>
                    <div><label>Visitantes</label><input type="number" id="v11" oninput="salvar()"></div>
                    <div><label>6º Andar</label><input type="number" id="s11" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">🛠️ Servindo</div>
                <div class="grid">
                    <div><label>Diaconia</label><input type="number" id="di11" oninput="salvar()"></div>
                    <div><label>Mesa</label><input type="number" id="me11" oninput="salvar()"></div>
                    <div><label>Louvor</label><input type="number" id="lo11" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">🧒 MI (Infantil)</div>
                <div class="grid">
                    <div><label>Crianças</label><input type="number" id="mic11" oninput="salvar()"></div>
                    <div><label>Servos</label><input type="number" id="mis11" oninput="salvar()"></div>
                    <div><label>Pai/Mãe</label><input type="number" id="mip11" oninput="salvar()"></div>
                </div>

                <div class="faixa faixa-esquerda">🌊 Classe Batismo</div>
                <div class="grid">
                    <div><label>Jovens</label><input type="number" id="bj" oninput="salvar()"></div>
                    <div><label>Adultos</label><input type="number" id="ba" oninput="salvar()"></div>
                    <div><label>Servos</label><input type="number" id="bs" oninput="salvar()"></div>
                </div>
            </div>
        </div>

        <button class="btn" style="background-color: #2e7d32;" onclick="gerarRelatorio()">📄 Visualizar Relatório</button>
        <div id="relatorio-preview"></div>
        <button class="btn" onclick="enviar()">📲 Enviar WhatsApp</button>
        <button class="btn" style="background-color: #546e7a; height: 65px; font-size: 20px; margin-top: 35px;" onclick="limpar()">🗑️ Limpar Formulário</button>
    </div>

   <script>
    const ids = ['res9','data_contagem','t9','v9','s9','di9','me9','lo9','mic9','mis9','mip9','mpac9','mpas9','mpap9','eb9','res11','t11','v11','s11','di11','me11','lo11','mic11','mis11','mip11','bj','ba','bs'];

    function toggleExpander(id) { document.getElementById(id).classList.toggle('open'); }

    function autenticar() {
        if(document.getElementById('senha').value.toUpperCase()==='PIB474'){
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            ids.forEach(id => { const v = localStorage.getItem('pib_'+id); if(v) document.getElementById(id).value = v; });
        } else { alert("Senha incorreta"); }
    }

    function salvar() { ids.forEach(id => localStorage.setItem('pib_'+id, document.getElementById(id).value)); }
    function limpar() { if(confirm("Limpar dados?")){ ids.forEach(id => localStorage.removeItem('pib_'+id)); location.reload(); } }
    function nz(id) { const v = document.getElementById(id).value; return v === "" ? 0 : parseInt(v); }

    // ESTA FUNÇÃO GERA O TEXTO COMPLETO SEMPRE
    function obterTextoCompleto() {
        const dt = document.getElementById('data_contagem').value.split('-').reverse().join('/') || "__/__/____";
        
        const comp9 = nz('t9')+nz('v9')+nz('s9');
        const serv9 = nz('di9')+nz('me9')+nz('lo9');
        const mi9 = nz('mic9')+nz('mis9')+nz('mip9');
        const mpa9 = nz('mpac9')+nz('mpas9')+nz('mpap9');
        const tot9 = comp9 + serv9 + mi9 + mpa9 + nz('eb9');

        const comp11 = nz('t11')+nz('v11')+nz('s11');
        const serv11 = nz('di11')+nz('me11')+nz('lo11');
        const mi11 = nz('mic11')+nz('mis11')+nz('mip11');
        const bat11 = nz('bj')+nz('ba')+nz('bs');
        const tot11 = comp11 + serv11 + mi11 + bat11;

        return `Relatório dos cultos

Culto das 9:00hrs
Responsável pela contagem: ${document.getElementById('res9').value}
Data: ${dt}

Compareceram
Templo e mezanino: ${nz('t9')}
Visitantes: ${nz('v9')}
Sexto andar: ${nz('s9')}
Total: ${comp9}

Servindo:
Diaconia: ${nz('di9')}
Mesa: ${nz('me9')}
Louvor: ${nz('lo9')}
Total: ${serv9}

MI:
Crianças: ${nz('mic9')}
Servos: ${nz('mis9')}
Pai/Mãe: ${nz('mip9')}
Total: ${mi9}

MPA:
Crianças: ${nz('mpac9')}
Servos: ${nz('mpas9')}
Pai/Mãe: ${nz('mpap9')}
Total: ${mpa9}

Ebed: ${nz('eb9')}

TOTAL DO CULTO DAS 9:00hrs: ${tot9}

------------------------------

Culto das 11:00hrs
Responsável pela contagem: ${document.getElementById('res11').value}
Data: ${dt}

Compareceram
Templo e mezanino: ${nz('t11')}
Visitantes: ${nz('v11')}
Sexto andar: ${nz('s11')}
Total: ${comp11}

Servindo:
Diaconia: ${nz('di11')}
Mesa: ${nz('me11')}
Louvor: ${nz('lo11')}
Total: ${serv11}

MI:
Crianças: ${nz('mic11')}
Servos: ${nz('mis11')}
Pai/Mãe: ${nz('mip11')}
Total: ${mi11}

Classe batismo:
Jovens: ${nz('bj')}
Adultos: ${nz('ba')}
Servos: ${nz('bs')}
Total: ${bat11}

TOTAL DO CULTO DAS 11:00hrs: ${tot11}

TOTAL GERAL: ${tot9 + tot11}`;
    }

    // BOTÃO VISUALIZAR (Apenas controla o que aparece na tela)
    function gerarRelatorio() {
        const preview = document.getElementById('relatorio-preview');
        if (preview.style.display === 'block') {
            preview.style.display = 'none';
        } else {
            preview.innerText = obterTextoCompleto();
            preview.style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    }

    // BOTÃO ENVIAR (Chama o texto completo e abre o WhatsApp)
    function enviar() { 
        const rel = obterTextoCompleto();
        const msg = "```\n" + rel + "\n```";
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank'); 
    }
</script>
